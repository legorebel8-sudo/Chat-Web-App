<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quantum Link</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <!-- LEFT SIDEBAR -->
    <div class="sidebar">

        <h2>Chats</h2>

        <button id="createChatButton">Create Chat</button>
        <button id="joinChatButton">Join Chat</button>

        <div id="chatList"></div>

    </div>

    <!-- MAIN CHAT AREA -->
    <div class="chat-container">

        <!-- CURRENT CHAT DISPLAY -->
        <div id="currentChatDisplay">Current Chat: Example Chat</div>

        <!-- MESSAGES -->
        <div id="messages"></div>

        <!-- INPUT AREA -->
        <div class="input-area">
            <input id="messageInput" type="text" placeholder="Type a message...">
            <button id="sendButton">Send</button>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
