<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum-Link</title>

    <!-- Link to our stylesheet -->
    <link rel="stylesheet" href="style.css">

    <!--
        AUTH CHECK
        Before the page finishes loading, check if the user is logged in.
        If not, redirect them to the login page immediately.
        This prevents someone from typing http://localhost:3000 directly
        and bypassing the login screen.
    -->
    <script>
        fetch("/api/me")
            .then((res) => {
                if (!res.ok) {
                    // Not logged in — send to login page
                    window.location.href = "/login.html";
                }
            })
            .catch(() => {
                // Server unreachable — still send to login page
                window.location.href = "/login.html";
            });
    </script>
</head>
<body>

<!--
    MAIN APP
    Two-column layout:
      Left  → Sidebar (chat list, search, buttons)
      Right → Chat area (messages + input)
-->
<div class="app" id="app">

    <!-- ================================
         LEFT SIDEBAR
         Shows the user's avatar, a search bar, and all chat rooms.
    ================================ -->
    <div id="sidebar">

        <!-- Top bar: current user's avatar, name, and "new room" button -->
        <div id="sidebar-header">
            <div id="my-avatar" class="avatar avatar-sm"></div>
            <span id="my-username">You</span>
            <button id="createChatButton" class="icon-btn" title="Create New Room">＋</button>
            <!--
                LOGOUT BUTTON
                Clicking this sends a logout request to the server,
                then redirects to the login page.
            -->
            <button id="logoutButton" class="icon-btn" title="Logout">⏻</button>
        </div>

        <!-- Search box — filters the room list as you type -->
        <div id="search-bar">
            <input id="searchInput" type="text" placeholder="Search chats...">
        </div>

        <!-- JavaScript fills this div with the list of available rooms -->
        <div id="chatList"></div>

        <!-- Bottom of sidebar: button to join a room by typing its name -->
        <div id="sidebar-footer">
            <button id="joinChatButton">Join a Room</button>
        </div>

    </div>


    <!-- ================================
         MAIN CHAT AREA
         Shows either the welcome screen or an active chat.
    ================================ -->
    <div id="chat-area">

        <!-- Shown before any room is selected -->
        <div id="welcome-screen">
            <div class="welcome-icon">⚡</div>
            <h2>Quantum Link</h2>
            <p>Select a chat room to start messaging</p>
        </div>

        <!-- Shown once a room is joined (hidden until then) -->
        <div id="active-chat" class="hidden">

            <!-- Header bar: back button (mobile), room avatar, room name, member toggle -->
            <div id="chat-header">
                <button id="back-btn" class="icon-btn back-btn" title="Back">←</button>
                <div id="chat-avatar" class="avatar avatar-md"></div>
                <div id="chat-info">
                    <div id="chat-name-display">Room Name</div>
                    <div id="online-count">0 online</div>
                </div>
                <button id="toggle-users-btn" class="icon-btn" title="Show Members">👥</button>
            </div>

            <!-- Collapsible panel listing who is online in this room -->
            <div id="users-panel" class="hidden">
                <div class="users-panel-title">Online Members</div>
                <!-- JavaScript fills this with user rows -->
                <div id="userList"></div>
            </div>

            <!-- Scrollable message history — JavaScript adds bubbles here -->
            <div id="messages"></div>

            <!-- Bottom input bar: type and send messages -->
            <div class="input-area">
                <input id="messageInput" type="text" placeholder="Type a message..." autocomplete="off">
                <button id="sendButton" class="send-btn" title="Send">➤</button>
            </div>

        </div>
    </div>

</div>

<!-- Socket.IO client — automatically served by the Node.js server -->
<script src="/socket.io/socket.io.js"></script>

<!-- Our frontend logic — loaded last so all HTML elements exist first -->
<script src="script.js"></script>
</body>
</html>
